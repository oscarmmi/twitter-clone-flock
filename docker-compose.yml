version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: flock-app
    container_name: flock-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - flock-network

  webserver:
    image: nginx:alpine
    container_name: flock-webserver
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - flock-network

  db:
    image: postgres:15-alpine
    container_name: flock-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-flock}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "54321:5432"
    networks:
      - flock-network

networks:
  flock-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
