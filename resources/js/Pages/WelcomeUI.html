<div x-data="{
    activeTab: 'for-you',
    tweetContent: '',
    tweets: [
        { id: 1, user: 'John Doe', handle: '@johndoe', time: '2h', content: 'Building something cool with Laravel and Inertia! 🚀', likes: 12, retweets: 5, replies: 2, avatar: 'https://i.pravatar.cc/150?u=1' },
        { id: 2, user: 'Jane Smith', handle: '@janesmith', time: '4h', content: 'Twitter clone is looking good. Alpine.js is amazing for this! ✨', likes: 45, retweets: 12, replies: 8, avatar: 'https://i.pravatar.cc/150?u=2' },
        { id: 3, user: 'Taylor Otwell', handle: '@taylorotwell', time: '1d', content: 'Laravel 12 is out now! Check out the documentation.', likes: 1200, retweets: 300, replies: 150, avatar: 'https://i.pravatar.cc/150?u=3' }
    ],
    postTweet() {
        if (this.tweetContent.trim()) {
            this.tweets.unshift({
                id: Date.now(),
                user: 'You',
                handle: '@you',
                time: 'now',
                content: this.tweetContent,
                likes: 0,
                retweets: 0,
                replies: 0,
                avatar: 'https://i.pravatar.cc/150?u=10'
            });
            this.tweetContent = '';
        }
    }
}" class="flex min-h-screen max-w-7xl mx-auto dark:bg-[#0a0a0a] dark:text-white">

    <!-- Left Sidebar: Navigation -->
    <aside class="w-64 border-r dark:border-zinc-800 p-4 sticky top-0 h-screen flex flex-col items-center xl:items-start">
        <div class="mb-6 px-4">
            <svg class="w-8 h-8 dark:text-white fill-current" viewBox="0 0 24 24"><path d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.392.106-.803.162-1.227.162-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z"/></svg>
        </div>
        <nav class="space-y-2 w-full">
            <template x-for="item in ['Home', 'Explore', 'Notifications', 'Messages', 'Grok', 'Lists', 'Communities', 'Premium', 'Verified Org', 'Profile', 'More']">
                <a href="#" :class="item === 'Home' ? 'font-bold' : ''" class="flex items-center space-x-4 p-3 hover:bg-zinc-200 dark:hover:bg-zinc-900 rounded-full transition-all duration-200 group">
                    <span class="w-6 h-6 border dark:border-zinc-700 rounded transition-colors group-hover:bg-blue-500"></span>
                    <span x-text="item" class="text-xl hidden xl:inline"></span>
                </a>
            </template>
        </nav>
        <button class="mt-8 bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full w-full shadow-lg shadow-blue-500/20 transform transition active:scale-95">
            Post
        </button>
    </aside>

    <!-- Main Feed -->
    <main class="flex-1 max-w-2xl border-r dark:border-zinc-800">
        <!-- Sticky Header -->
        <header class="sticky top-0 bg-white/80 dark:bg-black/80 backdrop-blur-md z-10 border-b dark:border-zinc-800">
            <div class="flex">
                <button @click="activeTab = 'for-you'" :class="activeTab === 'for-you' ? 'border-blue-500 text-black dark:text-white' : 'border-transparent text-zinc-500'" class="flex-1 py-4 hover:bg-zinc-200/50 dark:hover:bg-zinc-900/50 transition border-b-4 font-bold">
                    For you
                </button>
                <button @click="activeTab = 'following'" :class="activeTab === 'following' ? 'border-blue-500 text-black dark:text-white' : 'border-transparent text-zinc-500'" class="flex-1 py-4 hover:bg-zinc-200/50 dark:hover:bg-zinc-900/50 transition border-b-4 font-bold">
                    Following
                </button>
            </div>
        </header>

        <!-- New Tweet Section -->
        <div class="p-4 border-b dark:border-zinc-800 flex space-x-4">
            <img src="https://i.pravatar.cc/150?u=10" class="w-10 h-10 rounded-full" alt="Your avatar">
            <div class="flex-1">
                <textarea x-model="tweetContent" placeholder="What is happening?!" class="w-full bg-transparent border-none focus:ring-0 text-xl resize-none placeholder-zinc-500 min-h-32" maxlength="280"></textarea>
                <div class="flex justify-between items-center border-t dark:border-zinc-800 pt-3">
                    <div class="flex space-x-3 text-blue-500">
                        <!-- Icons placeholders -->
                        <span class="w-5 h-5 rounded hover:bg-blue-100 dark:hover:bg-blue-900/30 cursor-pointer"></span>
                        <span class="w-5 h-5 rounded hover:bg-blue-100 dark:hover:bg-blue-900/30 cursor-pointer"></span>
                        <span class="w-5 h-5 rounded hover:bg-blue-100 dark:hover:bg-blue-900/30 cursor-pointer"></span>
                    </div>
                    <button @click="postTweet()" :disabled="!tweetContent.trim()" class="bg-blue-500 disabled:opacity-50 text-white px-5 py-2 rounded-full font-bold hover:bg-blue-600 transition active:scale-95">
                        Post
                    </button>
                </div>
            </div>
        </div>

        <!-- Tweets List -->
        <div class="divide-y dark:divide-zinc-800">
            <template x-for="tweet in tweets" :key="tweet.id">
                <div class="p-4 hover:bg-zinc-50 dark:hover:bg-zinc-900/30 transition cursor-pointer flex space-x-3">
                    <img :src="tweet.avatar" class="w-10 h-10 rounded-full" :alt="tweet.user">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center space-x-1 text-sm">
                            <span class="font-bold dark:text-white truncate" x-text="tweet.user"></span>
                            <span class="text-zinc-500 truncate" x-text="tweet.handle"></span>
                            <span class="text-zinc-500">·</span>
                            <span class="text-zinc-500" x-text="tweet.time"></span>
                        </div>
                        <p class="mt-1 text-zinc-800 dark:text-zinc-200 break-words" x-text="tweet.content"></p>
                        <div class="flex justify-between mt-3 text-zinc-500 text-sm max-w-sm">
                            <div class="flex items-center space-x-2 group hover:text-blue-500">
                                <span class="w-4 h-4 rounded group-hover:bg-blue-100 dark:group-hover:bg-blue-900/30"></span>
                                <span x-text="tweet.replies"></span>
                            </div>
                            <div class="flex items-center space-x-2 group hover:text-green-500">
                                <span class="w-4 h-4 rounded group-hover:bg-green-100 dark:group-hover:bg-green-900/30"></span>
                                <span x-text="tweet.retweets"></span>
                            </div>
                            <div class="flex items-center space-x-2 group hover:text-pink-500">
                                <span class="w-4 h-4 rounded group-hover:bg-pink-100 dark:group-hover:bg-pink-900/30"></span>
                                <span x-text="tweet.likes"></span>
                            </div>
                            <div class="flex items-center space-x-2 group hover:text-blue-500 text-zinc-400">
                                <span class="w-4 h-4 rounded group-hover:bg-blue-100 dark:group-hover:bg-blue-900/30"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="w-80 hidden lg:flex flex-col p-4 sticky top-0 h-screen space-y-4">
        <div class="sticky top-2 bg-zinc-100 dark:bg-zinc-900 rounded-full px-4 py-2 flex items-center space-x-3 border dark:border-zinc-800 focus-within:bg-white dark:focus-within:bg-black focus-within:border-blue-500 transition">
            <svg class="w-5 h-5 text-zinc-500" fill="currentColor" viewBox="0 0 24 24"><path d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.384-.073.53-.22c.293-.293.293-.767 0-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"/></svg>
            <input type="text" placeholder="Search" class="bg-transparent border-none focus:outline-none w-full">
        </div>

        <div class="bg-zinc-50 dark:bg-zinc-900 border dark:border-zinc-800 rounded-2xl overflow-hidden">
            <h2 class="text-xl font-bold p-4">Trends for you</h2>
            <div class="divide-y dark:divide-zinc-800">
                <template x-for="i in [1, 2, 3, 4, 5]">
                    <div class="p-3 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition cursor-pointer">
                        <p class="text-zinc-500 text-xs">Trending in Tech</p>
                        <p class="font-bold">#Laravel12</p>
                        <p class="text-zinc-500 text-xs">4.2K posts</p>
                    </div>
                </template>
            </div>
            <button class="w-full text-left text-blue-500 p-4 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">Show more</button>
        </div>

        <div class="bg-zinc-50 dark:bg-zinc-900 border dark:border-zinc-800 rounded-2xl overflow-hidden">
            <h2 class="text-xl font-bold p-4">Who to follow</h2>
            <div class="divide-y dark:divide-zinc-800">
                <template x-for="user in ['Antigravity', 'DeepMind', 'OpenAI']">
                    <div class="p-3 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition cursor-pointer flex items-center justify-between">
                        <div class="flex items-center space-x-2">
                            <div class="w-10 h-10 rounded-full bg-zinc-300 dark:bg-zinc-700"></div>
                            <div>
                                <p class="font-bold text-sm" x-text="user"></p>
                                <p class="text-zinc-500 text-xs truncate" x-text="'@' + user.toLowerCase()"></p>
                            </div>
                        </div>
                        <button class="bg-black dark:bg-white text-white dark:text-black px-4 py-1.5 rounded-full font-bold text-sm hover:opacity-80 transition">Follow</button>
                    </div>
                </template>
            </div>
            <button class="w-full text-left text-blue-500 p-4 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition">Show more</button>
        </div>
    </aside>

</div>
